<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="42%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1a8fd4"/>
      <stop offset="50%" stop-color="#0b5da8"/>
      <stop offset="100%" stop-color="#032660"/>
    </radialGradient>
    <radialGradient id="gloss" cx="42%" cy="16%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cc">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <!-- Sombra externa -->
  <circle cx="256" cy="262" r="250" fill="#021840" opacity="0.45"/>
  <!-- Fundo principal -->
  <circle cx="256" cy="256" r="244" fill="#032660"/>
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <g clip-path="url(#cc)">
    <!-- Redemoinho 1: faixa larga da esquerda inferior ao centro superior -->
    <path d="M -10 420 C 60 310 160 200 300 148 C 380 120 450 140 490 200"
          fill="none" stroke="#3bbcec" stroke-width="52" stroke-opacity="0.32" stroke-linecap="round"/>
    <path d="M -10 420 C 60 310 160 200 300 148 C 380 120 450 140 490 200"
          fill="none" stroke="#7de4ff" stroke-width="18" stroke-opacity="0.45" stroke-linecap="round"/>

    <!-- Redemoinho 2: curva na parte inferior -->
    <path d="M 20 460 C 90 490 170 510 220 460 C 270 408 235 355 165 385 C 100 415 78 468 118 500"
          fill="none" stroke="#28a8d8" stroke-width="40" stroke-opacity="0.28" stroke-linecap="round"/>
    <path d="M 20 460 C 90 490 170 510 220 460 C 270 408 235 355 165 385 C 100 415 78 468 118 500"
          fill="none" stroke="#62d4f8" stroke-width="14" stroke-opacity="0.38" stroke-linecap="round"/>

    <!-- Redemoinho 3: pequena curva no canto superior direito -->
    <path d="M 370 20 C 440 70 475 160 460 260"
          fill="none" stroke="#2898cc" stroke-width="32" stroke-opacity="0.22" stroke-linecap="round"/>
    <path d="M 370 20 C 440 70 475 160 460 260"
          fill="none" stroke="#58ccf0" stroke-width="10" stroke-opacity="0.32" stroke-linecap="round"/>

    <!-- Brilho glossy no topo -->
    <circle cx="256" cy="256" r="240" fill="url(#gloss)"/>
  </g>

  <!-- Documento traseiro (levemente rotacionado para esquerda) -->
  <g transform="rotate(-9 248 252)">
    <rect x="162" y="152" width="152" height="194" rx="14" fill="#b8d8f2" opacity="0.85"/>
    <rect x="180" y="195" width="85" height="9" rx="4.5" fill="#4a88c0" opacity="0.45"/>
    <rect x="180" y="215" width="112" height="9" rx="4.5" fill="#4a88c0" opacity="0.4"/>
    <rect x="180" y="235" width="98" height="9" rx="4.5" fill="#4a88c0" opacity="0.35"/>
    <rect x="180" y="255" width="106" height="9" rx="4.5" fill="#4a88c0" opacity="0.3"/>
    <rect x="180" y="275" width="80" height="9" rx="4.5" fill="#4a88c0" opacity="0.25"/>
  </g>

  <!-- Documento frontal (levemente rotacionado para direita) -->
  <g transform="rotate(7 268 254)">
    <rect x="196" y="144" width="152" height="196" rx="14" fill="#ffffff" opacity="0.97"/>
    <!-- Cabeçalho do doc com leve cor -->
    <rect x="196" y="144" width="152" height="28" rx="14" fill="#daeeff" opacity="0.6"/>
    <rect x="196" y="158" width="152" height="14" fill="#daeeff" opacity="0.6"/>
    <!-- Linhas de texto -->
    <rect x="216" y="188" width="90" height="10" rx="5" fill="#1260a8" opacity="0.62"/>
    <rect x="216" y="210" width="118" height="10" rx="5" fill="#1260a8" opacity="0.50"/>
    <rect x="216" y="232" width="104" height="10" rx="5" fill="#1260a8" opacity="0.48"/>
    <rect x="216" y="254" width="112" height="10" rx="5" fill="#1260a8" opacity="0.40"/>
    <rect x="216" y="276" width="88"  height="10" rx="5" fill="#1260a8" opacity="0.32"/>
    <rect x="216" y="298" width="100" height="10" rx="5" fill="#1260a8" opacity="0.26"/>
  </g>

  <!-- Anel externo -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#042d72" stroke-width="10"/>
  <circle cx="256" cy="256" r="241" fill="none" stroke="#2a7acc" stroke-width="2.5" opacity="0.6"/>
</svg>