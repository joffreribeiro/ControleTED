<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Logo Sistema Controle TED">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#1a56db"/>
    </linearGradient>
  </defs>

  <!-- Fundo circular azul -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Documento branco central -->
