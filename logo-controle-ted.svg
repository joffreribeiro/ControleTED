<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Logo Sistema Controle TED">
  <defs>
    <linearGradient id="globeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1a4fa3"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <radialGradient id="globeShine" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe body -->
  <circle cx="220" cy="272" r="210" fill="url(#globeBg)"/>
  <circle cx="220" cy="272" r="210" fill="url(#globeShine)"/>

  <!-- Globe latitude lines -->
  <ellipse cx="220" cy="272" rx="210" ry="73" fill="none" stroke="#93c5fd" stroke-width="6" opacity="0.55"/>
  <ellipse cx="220" cy="272" rx="210" ry="140" fill="none" stroke="#93c5fd" stroke-width="5" opacity="0.35"/>
  <!-- Globe vertical center line -->
  <ellipse cx="220" cy="272" rx="73" ry="210" fill="none" stroke="#93c5fd" stroke-width="6" opacity="0.45"/>
  <!-- Globe horizontal axis -->
  <line x1="10" y1="272" x2="430" y2="272" stroke="#93c5fd" stroke-width="5" opacity="0.4"/>

  <!-- Document (white, overlapping globe, bottom-right) -->
  <rect x="270" y="160" width="210" height="268" rx="16" fill="url(#docGrad)" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.22))"/>
  <!-- Dog-ear fold -->
  <polygon points="422,160 480,218 480,160" fill="#bfdbfe"/>
  <line x1="422" y1="160" x2="422" y2="218" stroke="#93c5fd" stroke-width="2"/>
  <line x1="422" y1="218" x2="480" y2="218" stroke="#93c5fd" stroke-width="2"/>

  <!-- Document text lines -->
  <rect x="300" y="248" width="120" height="12" rx="6" fill="#1e3a8a" opacity="0.85"/>
  <rect x="300" y="276" width="148" height="12" rx="6" fill="#1e3a8a" opacity="0.75"/>
  <rect x="300" y="304" width="108" height="12" rx="6" fill="#1e3a8a" opacity="0.75"/>
  <rect x="300" y="332" width="136" height="12" rx="6" fill="#1e3a8a" opacity="0.65"/>
  <rect x="300" y="360" width="96"  height="12" rx="6" fill="#1e3a8a" opacity="0.55"/>
</svg>