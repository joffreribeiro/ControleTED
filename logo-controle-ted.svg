  <!-- Linhas de texto no documento -->
  <rect x="186" y="150" width="90" height="10" rx="5" fill="#1e3a8a" opacity="0.7"/>
  <rect x="186" y="175" width="140" height="10" rx="5" fill="#1e3a8a" opacity="0.55"/>
  <rect x="186" y="200" width="120" height="10" rx="5" fill="#1e3a8a" opacity="0.55"/>
  <rect x="186" y="225" width="140" height="10" rx="5" fill="#1e3a8a" opacity="0.45"/>
  <rect x="186" y="250" width="100" height="10" rx="5" fill="#1e3a8a" opacity="0.35"/>

  <!-- Faixa azul e branco abaixo do documento -->
  <rect x="116" y="370" width="280" height="40" rx="20" fill="#ffffff" opacity="0.25"/>
  <rect x="136" y="378" width="120" height="24" rx="12" fill="#ffffff" opacity="0.45"/>
  <rect x="266" y="378" width="110" height="24" rx="12" fill="#93c5fd" opacity="0.5"/>
